<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290" width="760" role="img" aria-label="Separating a series by time scale: HP splits trend from cycle by a smoothness penalty, band-pass filters isolate a period band, EMD sifts adaptive intrinsic mode functions, the wavelet scalogram maps energy over scale and time." style="color:currentColor;max-width:100%;height:auto;font-family:system-ui,sans-serif">
  <text x="380" y="20" text-anchor="middle" font-size="14" font-weight="600" fill="currentColor">Separating a series by time scale</text>

  <!-- input series -->
  <rect x="20" y="110" width="130" height="60" rx="6" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <text x="85" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">series</text>
  <path d="M30 150 q 10 -18 20 -6 t 20 2 q 8 -14 16 -4 t 18 4 q 8 -12 16 -2 t 10 2" fill="none" stroke="#9ca3af" stroke-width="1.3"/>

  <defs><marker id="ar4" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3b82f6"/></marker></defs>
  <line x1="150" y1="120" x2="205" y2="70" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#ar4)"/>
  <line x1="150" y1="140" x2="205" y2="140" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#ar4)"/>
  <line x1="150" y1="160" x2="205" y2="210" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#ar4)"/>

  <!-- HP branch -->
  <rect x="210" y="40" width="160" height="66" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="290" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">HP filter (penalty)</text>
  <path d="M220 88 Q 260 74 290 80 T 360 76" fill="none" stroke="#3b82f6" stroke-width="1.4"/>
  <path d="M220 96 q 8 -8 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0" fill="none" stroke="#f59e0b" stroke-width="1"/>
  <text x="290" y="118" text-anchor="middle" font-size="8.5" fill="currentColor" opacity="0.8">smooth trend (blue) + cycle (amber)</text>

  <!-- Band-pass branch -->
  <rect x="210" y="122" width="160" height="56" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="290" y="138" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">band-pass (BK / CF)</text>
  <line x1="222" y1="160" x2="358" y2="160" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
  <path d="M222 160 q 8 -12 17 0 t 17 0 t 17 0 t 17 0 t 17 0 t 17 0 t 17 0 t 17 0" fill="none" stroke="#10b981" stroke-width="1.3"/>
  <text x="290" y="174" text-anchor="middle" font-size="8.5" fill="currentColor" opacity="0.8">only cycles with period in [low, high]</text>

  <!-- EMD branch -->
  <rect x="210" y="194" width="160" height="80" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="290" y="209" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">EMD (adaptive sifting)</text>
  <text x="222" y="224" font-size="8" fill="currentColor" opacity="0.8">IMF1 (fast)</text>
  <path d="M275 222 q 5 -6 10 0 t 10 0 t 10 0 t 10 0 t 10 0 t 10 0 t 10 0 t 10 0" fill="none" stroke="#ef4444" stroke-width="1"/>
  <text x="222" y="242" font-size="8" fill="currentColor" opacity="0.8">IMF2</text>
  <path d="M275 240 q 12 -8 24 0 t 24 0 t 24 0" fill="none" stroke="#a855f7" stroke-width="1"/>
  <text x="222" y="260" font-size="8" fill="currentColor" opacity="0.8">residue (trend)</text>
  <path d="M275 260 Q 310 252 360 254" fill="none" stroke="#3b82f6" stroke-width="1"/>

  <!-- Scalogram -->
  <line x1="370" y1="140" x2="430" y2="140" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#ar4)"/>
  <rect x="435" y="55" width="220" height="180" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="545" y="72" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">CWT scalogram |W(t,s)|&#178;</text>
  <g opacity="0.85">
    <rect x="450" y="84" width="190" height="16" fill="#1e3a8a" opacity="0.35"/>
    <rect x="450" y="102" width="190" height="16" fill="#1e40af" opacity="0.45"/>
    <rect x="450" y="120" width="190" height="16" fill="#2563eb" opacity="0.85"/>
    <rect x="450" y="138" width="190" height="16" fill="#1e40af" opacity="0.45"/>
    <rect x="450" y="156" width="190" height="16" fill="#1e3a8a" opacity="0.35"/>
    <rect x="450" y="174" width="190" height="16" fill="#1e3a8a" opacity="0.25"/>
    <rect x="450" y="192" width="190" height="16" fill="#1e3a8a" opacity="0.2"/>
  </g>
  <text x="662" y="130" font-size="8.5" fill="#ef4444">bright band =</text>
  <text x="662" y="141" font-size="8.5" fill="#ef4444">dominant period</text>
  <text x="545" y="225" text-anchor="middle" font-size="8.5" fill="currentColor" opacity="0.8">x = time, y = scale (period); energy per band, and WHEN it occurs</text>
  <text x="443" y="95" font-size="7.5" fill="currentColor" opacity="0.6" text-anchor="end">long</text>
  <text x="443" y="200" font-size="7.5" fill="currentColor" opacity="0.6" text-anchor="end">short</text>

  <text x="380" y="262" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.85">Fixed-period seasonality -> STL/MSTL (seasonality page). No fixed period -> these scale-based views.</text>
  <text x="380" y="276" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.85">Caveat: an un-removed trend dumps energy into the longest scales - detrend before reading the scalogram.</text>
</svg>
