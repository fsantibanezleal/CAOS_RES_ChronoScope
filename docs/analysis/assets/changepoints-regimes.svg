<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="760" role="img" aria-label="Change-point and regime analysis: PELT segments the series at detected breaks; CUSUM tests stability against Brownian-bridge bounds; Markov switching assigns per-point regime probabilities." style="color:currentColor;max-width:100%;height:auto;font-family:system-ui,sans-serif">
  <text x="380" y="20" text-anchor="middle" font-size="14" font-weight="600" fill="currentColor">Where does the series change? Breaks, stability, regimes</text>

  <!-- Panel 1: PELT segmentation -->
  <rect x="20" y="38" width="345" height="110" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="192" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">PELT: penalized exact segmentation</text>
  <rect x="32" y="64" width="100" height="70" fill="#3b82f6" opacity="0.10"/>
  <rect x="132" y="64" width="110" height="70" fill="#10b981" opacity="0.12"/>
  <rect x="242" y="64" width="112" height="70" fill="#f59e0b" opacity="0.12"/>
  <path d="M32 112 l8 -3 8 4 8 -2 8 3 8 -4 8 2 8 -3 8 4 8 -2 8 3 8 -3 4 2" fill="none" stroke="currentColor" stroke-width="1.1"/>
  <path d="M132 84 l9 -3 9 4 9 -2 9 3 9 -4 9 2 9 -3 9 4 9 -2 9 3 9 -3 2 1" fill="none" stroke="currentColor" stroke-width="1.1"/>
  <path d="M242 124 l9 -3 9 4 9 -2 9 3 9 -4 9 2 9 -3 9 4 9 -2 9 3 9 -3 3 1" fill="none" stroke="currentColor" stroke-width="1.1"/>
  <line x1="132" y1="60" x2="132" y2="140" stroke="#ef4444" stroke-width="1.6" stroke-dasharray="5 3"/>
  <line x1="242" y1="60" x2="242" y2="140" stroke="#ef4444" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="132" y="146" text-anchor="middle" font-size="8" fill="#ef4444">break 1</text>
  <text x="242" y="146" text-anchor="middle" font-size="8" fill="#ef4444">break 2</text>
  <text x="192" y="160" text-anchor="middle" font-size="8.5" fill="currentColor" opacity="0.8">min sum of segment costs + penalty x (number of breaks)</text>

  <!-- Panel 2: CUSUM -->
  <rect x="395" y="38" width="345" height="110" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="567" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">OLS-CUSUM: cumulative residuals vs bounds</text>
  <line x1="410" y1="100" x2="725" y2="100" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
  <path d="M410 76 Q 567 56 725 76" fill="none" stroke="#3b82f6" stroke-width="1.1" stroke-dasharray="4 3"/>
  <path d="M410 124 Q 567 144 725 124" fill="none" stroke="#3b82f6" stroke-width="1.1" stroke-dasharray="4 3"/>
  <path d="M410 100 C 460 96 500 104 540 98 C 570 94 590 80 620 64 C 650 50 690 46 725 44" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="614" cy="67" r="3" fill="#ef4444"/>
  <text x="640" y="72" font-size="8" fill="#ef4444">crosses the bound -> unstable</text>
  <text x="567" y="160" text-anchor="middle" font-size="8.5" fill="currentColor" opacity="0.8">inside the Brownian-bridge band = parameters stable over time</text>

  <!-- Panel 3: Markov regimes -->
  <rect x="20" y="172" width="720" height="96" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="380" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">Markov switching: P(regime | data) per point (Hamilton 1989)</text>
  <path d="M40 216 l14 -2 14 3 14 -2 14 2 14 -3 14 2 M124 216 L164 200 l14 -2 14 3 14 -2 14 2 14 -3 M234 198 L274 214 l14 2 14 -3 14 2 14 -2 14 3 M344 216 L384 200 l14 -2 14 3 14 -2 14 2 M442 199 L482 215 l14 2 14 -3 14 2 14 -2 14 3 M552 216 L592 200 l14 -2 14 3 14 -2 14 2 14 -1 M662 200 l14 2 14 -1 14 2" fill="none" stroke="currentColor" stroke-width="1.1"/>
  <g>
    <rect x="40" y="238" width="84" height="10" fill="#3b82f6" opacity="0.75"/>
    <rect x="124" y="238" width="110" height="10" fill="#f59e0b" opacity="0.75"/>
    <rect x="234" y="238" width="110" height="10" fill="#3b82f6" opacity="0.75"/>
    <rect x="344" y="238" width="98" height="10" fill="#f59e0b" opacity="0.75"/>
    <rect x="442" y="238" width="110" height="10" fill="#3b82f6" opacity="0.75"/>
    <rect x="552" y="238" width="110" height="10" fill="#f59e0b" opacity="0.75"/>
    <rect x="662" y="238" width="58" height="10" fill="#3b82f6" opacity="0.75"/>
  </g>
  <text x="380" y="262" text-anchor="middle" font-size="8.5" fill="currentColor" opacity="0.8">smoothed regime probabilities colour each point: recurring states, not one-off breaks</text>
</svg>
