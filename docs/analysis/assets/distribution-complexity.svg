<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="760" role="img" aria-label="Distribution and complexity: histogram plus KDE and a Q-Q plot check the value distribution and normality; entropy measures and the BDS test quantify how predictable the ordering is." style="color:currentColor;max-width:100%;height:auto;font-family:system-ui,sans-serif">
  <text x="380" y="20" text-anchor="middle" font-size="14" font-weight="600" fill="currentColor">What values, and how predictable? Distribution vs complexity</text>

  <!-- Panel 1: histogram + KDE -->
  <rect x="20" y="38" width="230" height="118" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="135" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">Histogram + KDE</text>
  <line x1="32" y1="140" x2="238" y2="140" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
  <g fill="#3b82f6" opacity="0.25">
    <rect x="40" y="132" width="16" height="8"/><rect x="58" y="122" width="16" height="18"/>
    <rect x="76" y="104" width="16" height="36"/><rect x="94" y="82" width="16" height="58"/>
    <rect x="112" y="70" width="16" height="70"/><rect x="130" y="76" width="16" height="64"/>
    <rect x="148" y="96" width="16" height="44"/><rect x="166" y="116" width="16" height="24"/>
    <rect x="184" y="128" width="16" height="12"/><rect x="202" y="134" width="16" height="6"/>
  </g>
  <path d="M40 136 Q 80 132 100 96 Q 120 66 138 74 Q 160 90 190 128 Q 210 136 226 138" fill="none" stroke="#a855f7" stroke-width="1.6"/>
  <text x="135" y="152" text-anchor="middle" font-size="8" fill="currentColor" opacity="0.75">skew, kurtosis (tail weight)</text>

  <!-- Panel 2: Q-Q -->
  <rect x="262" y="38" width="230" height="118" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="377" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">Normal Q-Q plot</text>
  <line x1="290" y1="140" x2="470" y2="66" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4 3"/>
  <g fill="#3b82f6">
    <circle cx="298" cy="136" r="1.6"/><circle cx="316" cy="130" r="1.6"/><circle cx="334" cy="120" r="1.6"/>
    <circle cx="352" cy="112" r="1.6"/><circle cx="370" cy="102" r="1.6"/><circle cx="388" cy="94" r="1.6"/>
    <circle cx="406" cy="86" r="1.6"/><circle cx="424" cy="80" r="1.6"/><circle cx="442" cy="72" r="1.6"/>
    <circle cx="460" cy="60" r="1.6"/>
  </g>
  <text x="377" y="152" text-anchor="middle" font-size="8" fill="currentColor" opacity="0.75">on the line = normal; JB + Shapiro-Wilk verdict</text>

  <!-- Panel 3: entropy ladder -->
  <rect x="504" y="38" width="236" height="118" rx="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="622" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">Complexity / entropy</text>
  <text x="516" y="76" font-size="8" fill="currentColor" opacity="0.85">regular (sine)</text>
  <rect x="600" y="69" width="30" height="8" fill="#10b981"/>
  <text x="636" y="76" font-size="8" fill="#10b981">low entropy = predictable</text>
  <text x="516" y="98" font-size="8" fill="currentColor" opacity="0.85">structured</text>
  <rect x="600" y="91" width="80" height="8" fill="#f59e0b"/>
  <text x="516" y="120" font-size="8" fill="currentColor" opacity="0.85">white noise</text>
  <rect x="600" y="113" width="128" height="8" fill="#ef4444"/>
  <text x="636" y="120" font-size="8" fill="#ef4444">high = random</text>
  <text x="622" y="145" text-anchor="middle" font-size="7.5" fill="currentColor" opacity="0.75">sample / permutation / spectral entropy; BDS: i.i.d. vs hidden nonlinear</text>

  <text x="380" y="182" text-anchor="middle" font-size="10" font-weight="600" fill="currentColor">Two independent questions</text>
  <text x="380" y="200" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.85">Distribution asks WHAT values occur (are they Gaussian? heavy-tailed? skewed?) - it constrains which</text>
  <text x="380" y="213" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.85">error model and intervals are valid. Complexity asks how predictable the ORDER is - low entropy means</text>
  <text x="380" y="226" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.85">exploitable structure; a high-entropy, BDS-i.i.d. series is near-unforecastable regardless of its histogram.</text>
  <text x="380" y="250" text-anchor="middle" font-size="8.5" fill="currentColor" opacity="0.7">catch22: 22 canonical features (optional; recorded honestly as unavailable when the C extension is not built)</text>
</svg>
