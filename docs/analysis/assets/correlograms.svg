<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" role="img" aria-label="How to read ACF and PACF: their tail-off vs cut-off patterns identify AR, MA, ARMA, or white noise, bounded by the Bartlett band." style="color:currentColor;max-width:100%;height:auto;font-family:system-ui,sans-serif">
  <defs><marker id="ar2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3b82f6"/></marker></defs>
  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="currentColor">Reading the correlograms: AR vs MA vs ARMA vs white noise</text>
  <line x1="190" y1="60" x2="190" y2="270" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="380" y1="60" x2="380" y2="270" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="570" y1="60" x2="570" y2="270" stroke="currentColor" stroke-width="1" opacity="0.3"/>

  <!-- AR(p): ACF tails off, PACF cuts after p -->
  <text x="95" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="currentColor">AR(p)</text>
  <line x1="40" y1="160" x2="150" y2="160" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="148" x2="150" y2="148" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="40" y1="172" x2="150" y2="172" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <path d="M40 160 L150 160" stroke="none"/>
  <line x1="50" y1="160" x2="50" y2="95" stroke="#ef4444" stroke-width="2"/>
  <line x1="65" y1="160" x2="65" y2="118" stroke="#ef4444" stroke-width="2"/>
  <line x1="80" y1="160" x2="80" y2="135" stroke="#ef4444" stroke-width="2"/>
  <line x1="95" y1="160" x2="95" y2="145" stroke="#ef4444" stroke-width="2"/>
  <line x1="110" y1="160" x2="110" y2="150" stroke="#ef4444" stroke-width="2"/>
  <text x="95" y="88" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.8">ACF tails off</text>
  <line x1="50" y1="160" x2="50" y2="100" stroke="#10b981" stroke-width="2"/>
  <line x1="65" y1="160" x2="65" y2="158" stroke="#10b981" stroke-width="2"/>
  <line x1="80" y1="160" x2="80" y2="160" stroke="#10b981" stroke-width="2"/>
  <text x="95" y="195" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.8">PACF cuts after p</text>
  <text x="95" y="285" text-anchor="middle" font-size="9" fill="currentColor">p ~ last signif PACF lag</text>

  <!-- MA(q): ACF cuts after q, PACF tails off -->
  <text x="285" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="currentColor">MA(q)</text>
  <line x1="230" y1="160" x2="340" y2="160" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="148" x2="340" y2="148" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="230" y1="172" x2="340" y2="172" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="240" y1="160" x2="240" y2="100" stroke="#ef4444" stroke-width="2"/>
  <line x1="255" y1="160" x2="255" y2="159" stroke="#ef4444" stroke-width="2"/>
  <text x="285" y="88" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.8">ACF cuts after q</text>
  <line x1="240" y1="160" x2="240" y2="115" stroke="#10b981" stroke-width="2"/>
  <line x1="255" y1="160" x2="255" y2="128" stroke="#10b981" stroke-width="2"/>
  <line x1="270" y1="160" x2="270" y2="140" stroke="#10b981" stroke-width="2"/>
  <line x1="285" y1="160" x2="285" y2="148" stroke="#10b981" stroke-width="2"/>
  <text x="285" y="195" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.8">PACF tails off</text>
  <text x="285" y="285" text-anchor="middle" font-size="9" fill="currentColor">q ~ last signif ACF lag</text>

  <!-- ARMA: both tail off -->
  <text x="475" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="currentColor">ARMA(p,q)</text>
  <line x1="420" y1="160" x2="530" y2="160" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="420" y1="148" x2="530" y2="148" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="420" y1="172" x2="530" y2="172" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="430" y1="160" x2="430" y2="102" stroke="#ef4444" stroke-width="2"/>
  <line x1="445" y1="160" x2="445" y2="122" stroke="#ef4444" stroke-width="2"/>
  <line x1="460" y1="160" x2="460" y2="138" stroke="#ef4444" stroke-width="2"/>
  <line x1="475" y1="160" x2="475" y2="150" stroke="#ef4444" stroke-width="2"/>
  <text x="475" y="88" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.8">both tail off</text>
  <line x1="430" y1="160" x2="430" y2="108" stroke="#10b981" stroke-width="2"/>
  <line x1="445" y1="160" x2="445" y2="130" stroke="#10b981" stroke-width="2"/>
  <line x1="460" y1="160" x2="460" y2="146" stroke="#10b981" stroke-width="2"/>
  <text x="475" y="285" text-anchor="middle" font-size="9" fill="currentColor">fit (p,q) by AIC</text>

  <!-- white noise: all inside the band -->
  <text x="665" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="currentColor">white noise</text>
  <line x1="610" y1="160" x2="720" y2="160" stroke="currentColor" stroke-width="1" opacity="0.3"/>
  <line x1="610" y1="148" x2="720" y2="148" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="610" y1="172" x2="720" y2="172" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="620" y1="160" x2="620" y2="155" stroke="#9ca3af" stroke-width="2"/>
  <line x1="635" y1="160" x2="635" y2="166" stroke="#9ca3af" stroke-width="2"/>
  <line x1="650" y1="160" x2="650" y2="153" stroke="#9ca3af" stroke-width="2"/>
  <line x1="665" y1="160" x2="665" y2="169" stroke="#9ca3af" stroke-width="2"/>
  <line x1="680" y1="160" x2="680" y2="156" stroke="#9ca3af" stroke-width="2"/>
  <line x1="695" y1="160" x2="695" y2="163" stroke="#9ca3af" stroke-width="2"/>
  <text x="665" y="88" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.8">all lags inside band</text>
  <text x="665" y="195" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.8">Ljung-Box not signif</text>
  <text x="665" y="285" text-anchor="middle" font-size="9" fill="currentColor">no ARMA to identify</text>

  <text x="380" y="295" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.7">dashed blue = Bartlett band +/-1.96/sqrt(n)</text>
</svg>
