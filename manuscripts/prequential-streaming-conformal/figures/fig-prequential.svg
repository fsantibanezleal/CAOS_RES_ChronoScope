<svg xmlns="http://www.w3.org/2000/svg" width="640" height="290" viewBox="0 0 640 290" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2b6cb0"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#718096"/></marker>
    <style>
      .t{fill:#1a202c;font-size:12px;text-anchor:middle;} .ts{fill:#4a5568;font-size:10px;text-anchor:middle;}
      .box{fill:#ebf8ff;stroke:#2b6cb0;stroke-width:1.4;rx:6;} .st{fill:#fffaf0;stroke:#c05621;stroke-width:1.4;rx:6;}
      .loop{stroke:#2b6cb0;stroke-width:1.8;fill:none;marker-end:url(#ap);}
      .hdr{fill:#718096;font-size:10.5px;font-weight:bold;letter-spacing:.4px;}
    </style>
  </defs>

  <text class="t" x="320" y="24" font-weight="bold" font-size="13">Prequential (test-then-train) evaluation of a STATEFUL forecaster</text>

  <!-- the loop -->
  <rect class="box" x="60"  y="70" width="118" height="48"/><text class="t" x="119" y="90">1. PREDICT</text><text class="ts" x="119" y="106">horizon h from state s_t</text>
  <rect class="box" x="262" y="70" width="118" height="48"/><text class="t" x="321" y="90">2. REVEAL truth</text><text class="ts" x="321" y="106">y at t+h observed</text>
  <rect class="box" x="464" y="70" width="118" height="48"/><text class="t" x="523" y="90">3. SCORE</text><text class="ts" x="523" y="106">MASE, coverage, cost</text>
  <rect class="st"  x="262" y="168" width="118" height="48"/><text class="t" x="321" y="188">4. UPDATE state</text><text class="ts" x="321" y="204">s_t  ->  s_t+1 (state carried)</text>

  <path class="loop" d="M178,94 L262,94"/>
  <path class="loop" d="M380,94 L464,94"/>
  <path class="loop" d="M523,118 L523,192 L380,192"/>
  <path class="loop" d="M262,192 L119,192 L119,118"/>
  <text class="ts" x="450" y="160" fill="#2b6cb0">only then</text>

  <!-- covariate arrival policy -->
  <rect x="60" y="240" width="230" height="34" rx="5" fill="#f7fafc" stroke="#cbd5e0"/>
  <text class="ts" x="175" y="256" font-weight="bold">covariate-arrival policy (per channel)</text>
  <text class="ts" x="175" y="269">known-future (planned) vs revealed-with-target</text>

  <!-- contrast with stateless -->
  <rect x="350" y="240" width="230" height="34" rx="5" fill="#fff5f5" stroke="#feb2b2"/>
  <text class="ts" x="465" y="256" font-weight="bold" fill="#c53030">stateless-window harnesses (fev/GluonTS/Darts)</text>
  <text class="ts" x="465" y="269" fill="#742a2a">reset state each window; no test-then-train loop</text>

  <text class="ts" x="320" y="150">skill is a trajectory over the stream: an adapting model's error falls, a static one drifts</text>
</svg>
